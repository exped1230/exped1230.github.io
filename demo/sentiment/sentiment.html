<script type="text/javascript">
    function F_Open_dialog()
    {
        document.getElementById("btn_file").click();
    }

    function round(value, precision) {
        var multiplier = Math.pow(10, precision || 0);
        return Math.round(value * multiplier) / multiplier;
    }

    function sendFromData(fd, img_file) {
        $.ajax({
            type:'POST',
            url: "https://exped1230.cpolar.top/sentiment_upload",
            data: fd,
            cache:false,
            contentType: false,
            processData: false,
            success:function(res){
                document.getElementById("overlay").style.display = "none";
                console.log(res)
				var fr = new FileReader();
				fr.readAsDataURL(img_file);
				fr.onloadend = function(){
					document.getElementById("input_image").src = fr.result;
				}
                emotions = res["emotion"];
                sentiments = res["sentiment"];
                let positive = round(parseFloat(sentiments[0])*100, 1)
                let negative = round(parseFloat(sentiments[1])*100, 1)
                let pos_val = document.getElementById("pos_val");
                let neg_val = document.getElementById("neg_val");
                pos_val.innerHTML = "&#128512; Positive: "+positive+"%"
                neg_val.innerHTML = "&#128533; Negative: "+negative+"%"
                pos_val_bar.style["width"] = positive+"%";
                neg_val_bar.style["width"] = negative+"%";
                
                let data = emotions.map(parseFloat);
                plot_chart(data)
            },
            error: function(data){
                document.getElementById("overlay").style.display = "none";
                alert("Sorry, something went wrong.");
            }
        });
    }

    function imgChange(self) {
        if (self.files.length < 1) {
            return;
        }
        document.getElementById("overlay").style.display = "flex";
        var img_file = self.files[0];
        var formData = new FormData();
        formData.append("img", img_file);
        sendFromData(formData, img_file);
    }


    function exampleImage(name) {
        document.getElementById("overlay").style.display = "flex";
        var formData = new FormData();
		formData.append('img_path', "./sentiment/examples/"+name+".png")
		$.ajax({
		    type:'POST',
		    // url: "http://47.111.31.20:8083/emotion_example_img",
			url: "https://exped1230.cpolar.top/sentiment_example",
		    data: formData,
		    cache:false,
		    contentType: false,
		    processData: false,
		    success:function(res){
		        document.getElementById("overlay").style.display = "none";
		        console.log(res)
		        document.getElementById("input_image").src = "./global/" + name + ".png";
				emotions = res["emotion"]
				sentiments = res["sentiment"]
				let positive = round(parseFloat(sentiments[0])*100, 1)
				let negative = round(parseFloat(sentiments[1])*100, 1)
				let pos_val = document.getElementById("pos_val");
				let neg_val = document.getElementById("neg_val");
				pos_val.innerHTML = "&#128512; Positive: "+positive+"%"
				neg_val.innerHTML = "&#128533; Negative: "+negative+"%"
				pos_val_bar.style["width"] = positive+"%";
				neg_val_bar.style["width"] = negative+"%";
				
				let data = emotions.map(parseFloat);
				plot_chart(data)
		    },
		    error: function(data){
		        document.getElementById("overlay").style.display = "none";
		        alert("Sorry, something went wrong.");
		    }
		});
		
    }
	
	function plot_chart(data) {
		myChart.data.datasets[0].data = data;
		myChart.update();
	}

</script>

<script src="./chart/dist/Chart.bundle.js"></script>

<script>

    var ctx = document.getElementById('myChart').getContext('2d');
    var myChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['Amusement', 'Contentment', 'Awe', 'Excitement', 'Fear', 'Sadness', 'Disgust', 'Anger'],
            datasets: [{
                label: 'Emotion confidence',
                data: [1,2,3,4,5,6,7,8],
                backgroundColor: [
                    'rgba(33, 192, 255, 1)',
                    'rgba(33, 162, 235, 1)',
                    'rgba(22, 172, 205, 1)',
                    'rgba(176, 164, 227, 1)',
                    'rgba(255, 164, 0, 1)',
                    'rgba(255, 241, 67, 1)',
                    'rgba(255, 71, 119, 1)',
                    'rgba(113, 162, 66, 1)',
                ],
                borderColor: [
                    'rgba(33, 156, 188, 1)',
                    'rgba(33, 162, 235, 1)',
                    'rgba(22, 172, 205, 1)',
                    'rgba(176, 164, 227, 1)',
                    'rgba(255, 164, 0, 1)',
                    'rgba(255, 241, 67, 1)',
                    'rgba(255, 71, 119, 1)',
                    'rgba(113, 162, 66, 1)',
                ],
                borderWidth: 1
            }],
        },
        options: {
            scales: {
                yAxes: [{
                    ticks: {
                        beginAtZero: true
                    }
                }]
            },
			"animation": {
			    "duration": 0,
			    "onComplete": function() {
					var chartInstance = this.chart,
					ctx = chartInstance.ctx;
			
					ctx.font = Chart.helpers.fontString(Chart.defaults.global.defaultFontSize, Chart.defaults.global.defaultFontStyle, Chart.defaults.global.defaultFontFamily);
					ctx.textAlign = 'center';
					ctx.textBaseline = 'bottom';
			
					this.data.datasets.forEach(function(dataset, i) {
						var meta = chartInstance.controller.getDatasetMeta(i);
						meta.data.forEach(function(bar, index) {
							var data = dataset.data[index];
							ctx.fillText(data, bar._model.x, bar._model.y - 5);
						});
					});
			    }
			}
        }

</script>
